name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (project + dev deps, pins graphifyy==0.9.6)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q

  package:
    # Proves the wheel is really pip-installable: bundled rules/viz load from a clean
    # env, analyze produces the three artifacts, and taint.json is byte-identical twice.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install the wheel into a clean venv
        run: |
          python -m venv "$RUNNER_TEMP/cleanenv"
          "$RUNNER_TEMP/cleanenv/bin/pip" install --upgrade pip
          "$RUNNER_TEMP/cleanenv/bin/pip" install dist/secgraph-*.whl
      - name: Smoke analyze from a temp cwd (uses BUNDLED rules) + determinism
        run: |
          set -euo pipefail
          FIX="$PWD/tests/fixtures/tiny"
          SG="$RUNNER_TEMP/cleanenv/bin/secgraph"
          mkdir -p "$RUNNER_TEMP/smoke" && cd "$RUNNER_TEMP/smoke"
          "$SG" --version
          "$SG" analyze "$FIX" --out-dir out1
          "$SG" analyze "$FIX" --out-dir out2
          test -f out1/graph.json && test -f out1/taint.json && test -f out1/secgraph.html
          cmp out1/taint.json out2/taint.json && echo "determinism OK (byte-identical)"
