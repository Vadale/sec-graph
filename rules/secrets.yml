# Secret-literal detection (ROADMAP.md Section 11). Named formats first at high confidence;
# a generic entropy fallback is charset- and length-gated to keep the map clean. Applied to
# Python string literals + module constants now; raw-text over graphify's other languages is
# Phase 8, reusing this same pack via `classify_secret`.
version: 1
secrets:
  min_length: 16
  max_length: 512
  base64_threshold: 4.5      # bits/char over a base64-ish charset (near-random)
  hex_threshold: 3.5         # bits/char over a hex charset (above typical decimal-id entropy)
  confidence: medium         # entropy-fallback confidence (named patterns set their own)
  deny_values:               # obvious placeholders -> never a finding
    - "(?i)changeme"
    - "(?i)example"
    - "(?i)placeholder"
    - "(?i)dummy"
    - "(?i)your[_-]?"
    - "(?i)xxx+"
    - "(?i)redacted"
    - "<[^>]*>"              # <token>, <your-key-here>
    - "\\$\\{[^}]*\\}"       # ${ENV_VAR}
    - "%[sd]"               # %s / %d format holes
  test_path_globs:
    - "tests/**"
    - "**/*_test.py"
    - "**/conftest.py"
  patterns:
    - { id: aws-access-key-id, regex: "AKIA[0-9A-Z]{16}", layers: [credentials], confidence: high }
    - { id: aws-secret-key, regex: "(?i)aws.{0,20}?(secret|access).{0,20}?['\"][0-9a-zA-Z/+]{40}['\"]", layers: [credentials], confidence: high }
    - { id: jwt, regex: "eyJ[A-Za-z0-9_-]{8,}\\.[A-Za-z0-9_-]{8,}\\.[A-Za-z0-9_-]{6,}", layers: [credentials], confidence: high }
    - { id: pem-private-key, regex: "-----BEGIN [A-Z ]*PRIVATE KEY-----", layers: [credentials], confidence: high }
    - { id: github-token, regex: "gh[pousr]_[A-Za-z0-9]{36}", layers: [credentials], confidence: high }
    - { id: slack-token, regex: "xox[bpars]-[0-9A-Za-z-]{10,}", layers: [credentials], confidence: high }
    - { id: url-credentials, regex: "://[^/\\s:]+:[^/\\s@]{3,}@", layers: [credentials], confidence: high }
    - { id: credit-card, regex: "\\b(?:\\d[ -]?){13,19}\\b", validator: luhn, layers: [pii], confidence: medium }
