# Sensitive-data layer dictionaries (ROADMAP.md Section 11, Phase 4).
# Identifiers are matched WORD-BASED (whole token-run, not substring): `tokenizer` and
# `next_token` do NOT match the credentials layer. Bare ambiguous tokens (`token`, `key`,
# `salt`) are deliberately absent; only unambiguous single words and compound identifiers
# are listed, to keep the map clean. Broader weak-term bigram matching is deferred.
version: 1
labels:
  credentials:
    confidence: medium
    identifiers:
      - password
      - passwd
      - pwd
      - passphrase
      - secret
      - credential
      - credentials
      - api_key
      - apikey
      - secret_key
      - private_key
      - access_token
      - refresh_token
      - auth_token
      - client_secret
      - session_key
      - encryption_key
      - bearer
      - jwt
      - ssh_key
  pii:
    confidence: medium
    identifiers:
      - email
      - email_address
      - ssn
      - social_security
      - dob
      - date_of_birth
      - credit_card
      - card_number
      - iban
      - passport
      - passport_number
      - tax_id
      - phone_number
      - first_name
      - last_name
      - full_name
      - street_address
      - home_address
      - billing_address

# Auth-barrier vocabulary for unguarded-sink detection (WP-C2). A dangerous sink with none of
# these dominating it on the analyzed path is reported as UNGUARDED.
barriers:
  decorators:                        # function-entry guards
    - login_required
    - permission_required
    - admin_required
    - requires_auth
    - auth_required
    - jwt_required
    - roles_required
    - roles_accepted
    - staff_member_required
  callables:                         # dominating guard calls (require_admin(); ...)
    - authorize
    - require_admin
    - require_login
    - check_permission
    - verify_token
    - ensure_authenticated
  test_attrs:                        # auth conditions (if not current_user.is_admin: ...)
    - is_authenticated
    - is_admin
    - is_staff
    - is_superuser
    - has_role
    - has_permission
    - has_perm
  aborts:                            # calls that terminate the block (raise / exit)
    - abort
    - flask.abort
    - sys.exit
    # NB: a bare `HttpResponseForbidden(...)` does NOT terminate (it must be returned); the
    # realistic `return HttpResponseForbidden(...)` is already caught by the Return branch.
